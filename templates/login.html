{% extends 'base.html' %}

{% block title %}Tickit - Iniciar Sesión{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center mt-5">
    <div class="col-md-6 col-lg-5 col-xl-4">
        
        <div class="text-center mb-4">
            <div class="bg-primary bg-opacity-10 d-inline-flex p-3 rounded-circle mb-3">
                <i class="bi bi-tools fs-1 text-primary"></i>
            </div>
            <h2 class="fw-bold text-dark">Acceso al Sistema</h2>
            <p class="text-muted">Introduce tus credenciales para gestionar tus tickets</p>
        </div>

        <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
            <div class="card-body p-4 p-lg-5">
                <form action="{{ url_for('usuario.login') }}" method="POST">
                    
                    <div class="mb-3">
                        <label for="email" class="form-label fw-bold text-secondary small">CORREO ELECTRÓNICO</label>
                        <div class="input-group shadow-sm">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="bi bi-envelope text-muted"></i>
                            </span>
                            <input type="email" class="form-control border-start-0 ps-0" id="email" name="email" 
                                   placeholder="ejemplo@empresa.com" required autofocus>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="contrasenya" class="form-label fw-bold text-secondary small">CONTRASEÑA</label>
                        <div class="input-group shadow-sm">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="bi bi-shield-lock text-muted"></i>
                            </span>
                            <input type="password" class="form-control border-start-0 ps-0" id="contrasenya" 
                                   name="contrasenya" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <div class="row g-2">
                        <div class="col-8">
                            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">
                                <i class="bi bi-box-arrow-in-right me-1"></i> Entrar
                            </button>
                        </div>
                        <div class="col-4">
                            <a href="{{ url_for('usuario.registro') }}" class="btn btn-outline-secondary w-100 py-2">
                                Unirse
                            </a>
                        </div>
                    </div>
                </form>
            </div>
            
            <div class="card-footer bg-light border-0 py-3 text-center">
                <small class="text-muted">
                    <i class="bi bi-info-circle me-1"></i> ¿Problemas para entrar? Contacta con el Administrador.
                </small>
            </div>
        </div>

    </div>
</div>
{% endblock %}
